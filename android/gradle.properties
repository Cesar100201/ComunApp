# Memoria más estable para evitar crash del daemon (8G puede causar fallos en la JVM)
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
android.useAndroidX=true
# Opcional: desactivar daemon si sigue fallando (build más lento pero más estable)
# org.gradle.daemon=false
